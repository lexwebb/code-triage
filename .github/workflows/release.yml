name: Release

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # for npm provenance

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build:all

      - name: Set version from release tag
        # Strips leading 'v' so 'v1.2.3' becomes '1.2.3'. Uses pkg set (not npm version) so the step
        # succeeds when release.mjs already committed that version on the tagged commit.
        run: npm pkg set "version=${GITHUB_REF_NAME#v}"

      - name: Remove private flag for publishing
        # Yarn workspaces require private:true, but npm publish requires it absent
        run: npm pkg delete private

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
